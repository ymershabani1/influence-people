<div class="categories-page">
  <div class="page-header">
    <h1>Categories</h1>
    <p>Manage influencer categories</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <mat-card class="form-card p-6">
      <h2>{{ editingId() ? 'Edit Category' : 'Add Category' }}</h2>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 mt-4">
        <mat-form-field>
          <mat-label>Name</mat-label>
          <input matInput formControlName="name" />
        </mat-form-field>
        <mat-form-field>
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="3"></textarea>
        </mat-form-field>
        <mat-slide-toggle formControlName="is_active">Active</mat-slide-toggle>
        <div class="flex gap-2">
          <button mat-flat-button color="primary" type="submit">
            {{ editingId() ? 'Update' : 'Create' }}
          </button>
          @if (editingId()) {
            <button mat-stroked-button type="button" (click)="cancelEdit()">Cancel</button>
          }
        </div>
      </form>
    </mat-card>

    <mat-card class="table-card lg:col-span-2 p-6">
      <table mat-table [dataSource]="categories()" class="w-full">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let row">{{ row.name }}</td>
        </ng-container>
        <ng-container matColumnDef="slug">
          <th mat-header-cell *matHeaderCellDef>Slug</th>
          <td mat-cell *matCellDef="let row">{{ row.slug }}</td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <span [class]="row.is_active ? 'text-emerald-600' : 'text-gray-400'">
              {{ row.is_active ? 'Active' : 'Inactive' }}
            </span>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button (click)="startEdit(row)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" (click)="deleteCategory(row.id)"><mat-icon>delete</mat-icon></button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
  </div>
</div>
