<mat-sidenav-container class="admin-container">
  <mat-sidenav mode="side" opened class="admin-sidenav">
    <div class="sidenav-header">
      <div class="logo">
        <mat-icon>groups</mat-icon>
        <span>Admin Panel</span>
      </div>
    </div>

    <mat-nav-list>
      @for (item of navItems; track item.path) {
        <a mat-list-item [routerLink]="item.path" routerLinkActive="active-link">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <mat-nav-list>
        <a mat-list-item routerLink="/">
          <mat-icon matListItemIcon>public</mat-icon>
          <span matListItemTitle>View Site</span>
        </a>
        <a mat-list-item (click)="logout()">
          <mat-icon matListItemIcon>logout</mat-icon>
          <span matListItemTitle>Logout</span>
        </a>
      </mat-nav-list>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="admin-toolbar">
      <span class="toolbar-title">Influencer Directory</span>
      <span class="spacer"></span>
      <span class="user-name">{{ auth.user()?.name }}</span>
    </mat-toolbar>

    <main class="admin-content">
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
